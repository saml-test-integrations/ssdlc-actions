name: GitHub Actions Security Analysis with zizmor
description: |
  This Github action is required for all public repos running Github actions at Mozilla.
  It is configured to run with Github advanced security.
  It is included in a ruleset configured on the Github organization level.

on:
  push:
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # This permission is required to upload SARIF files.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: false

      - run: uvx zizmor --min-confidence=high --min-severity=high --format sarif . > results.sarif

      - uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          sarif_file: results.sarif
          category: zizmor
